<div id="舞台"></div>
<style>
    .它{max-width:100%;cursor:pointer;transition:transform 0.2s;}
    .它:hover{transform:scale(1.05);}
</style>

<script>
    let 名="阿巴比布波达多哈罗拉玛那";
    let 生物=[
        //S
        "6","7","12","13","18",
        //A
        "0","1","3","8","9","11",
        //B
        "2","5","10","14","15","19",
        //C
        "4","16","17",
    ];

    let 顺带一提="或者从一开始就不要开始。";
    let 已故=localStorage.getItem("x17986889");

    if(已故){
        顺带一提="对了，<b>"+已故+"</b>还好么？<br>你……没有杀掉它吧？"
        localStorage.removeItem("x17986889");
    }
    document.getElementById("舞台").innerHTML="点击“<a onclick='开始游戏()'>开始游戏</a>”，将诞生一只小生物。<br>需要保持网页一直开着，它才能继续存活，如果网页关闭了，它也就死了。<br><br>"+顺带一提;
    let 生日;

    function 开始游戏(){
        生日=Date.now();
        let id=(Math.floor((生日-new Date(2000,0,1))/10000)+"");
        let len=名.length;
        let 它='';
        let n=+id;
        while(true){
            它=名[n%len]+它;
            n=Math.floor(n/len);
            if(n===0)break;
            n--;
        }
        if(它==已故){
            document.getElementById("舞台").innerHTML="这里还在打扫……请稍后再来。";
        }else{
            localStorage.setItem("x17986889",它);
            document.getElementById("舞台").innerHTML="它的名字是：<b>"+它+"</b>。<br>请照顾好它，关闭网页或者刷新页面，它就会死，所以请尽量保持网页存在。<br><br><img class='它' onclick='存活()' src='/x/17986889/"+(生物[id%生物.length])+".png'>";
        }
    }

    function 存活(){
        let 已=Math.floor((Date.now()-生日)/1000);
        const d=Math.floor(已/86400);
        const h=Math.floor(已%86400/3600);
        const m=Math.floor(已%3600/60);
        let txt;
        if(d>0)txt=`${d}天${h}小时${m}分钟`;
        else if(h>0)txt=`${h}小时${m}分钟`;
        else if(m>0)txt=`${m}分钟`;
        else txt=`不到1分钟`;
        try{notyf.confirm("它已经存活了"+txt)}catch(e){alert("它已经存活了"+txt);}
    }
</script>
