传说，孙悟空大闹天宫，打得天兵天将没人能敌，天庭大乱。玉帝无奈，请来了如来佛祖收服他。<br>
如来和孙悟空打赌：只要他能飞出自己的手掌，天庭就归他。<br>
孙悟空自信满满，一个筋斗翻到天边，还留字做记号。谁知根本没逃出如来的手心。<br>
如来大手一挥，变出五行大山，死死压住孙悟空。<br>
<div id="舞台"></div>
<script>
    let 进度=localStorage.getItem("无用游戏_五行山下")||0;
    let 当前=new Date().getFullYear();
    let 被压=[
        "有一只小鸟落在了孙悟空的头上。",
        "附近村落的小孩带着桃子来看望孙悟空。",
        "孙悟空打了个盹儿。",
        "孙悟空拔掉了一根杂草。",
        "孙悟空挠了挠脑袋。",
        "上山砍柴的农夫坐在旁边休息，和孙悟空聊了会儿天。",
        "孙悟空看着天上的云发呆。",
        "轻风吹过，一片树叶在孙悟空眼前飘过。",
        "山上的果子熟了，刚好掉在孙悟空手边。",
        "孙悟空在想念花果山。",
        "孙悟空闻到远处飘来的花香。",
    ];
    const t=n=>{let c=['零','一','二','三','四','五','六','七','八','九'],s='',x=n+'';for(let i=0;i<x.length;i++){let d=+x[i],m=x.length-i-1;d&&(s+=c[d]+['','十','百'][m]);!d&&s&&s.slice(-1)!='零'&&(s+='零')}return s.replace(/零$|一十/g,x=>x=='一十'?'十':'')||'零'}
    function 变化(){
        if(进度==0){
            document.getElementById("舞台").innerHTML=`<a onclick="开始游戏()">开始游戏</a>`;
        }else{
            let 相差=当前-进度;
            let 剧本="";
            if(相差>=500){
                剧本=`五百年后，一个和尚路过此地，看见了石缝里的猴子。<br>从此开始了一段新的传奇故事。`;
            }else if(相差<0||相差>999){
                剧本=`��年后，一个��路过此地，看见了石缝里的��。<br>�������������。`;
            }else{
                if(相差==0){
                    剧本=`现在是孙悟空被压在山下的第一年。`;
                }else{
                    剧本=`孙悟空已经被压在山下${t(相差)}年了。`;
                }
                剧本+="<br><br>"+被压[Math.floor(Math.random()*被压.length)]+`<br><a onclick="变化()">继续等待</a>`;
            }
            document.getElementById("舞台").innerHTML=剧本;
        }
    }
    function 开始游戏(){
        进度=当前;
        localStorage.setItem("无用游戏_五行山下",当前);
        变化();
    }
    变化();
</script>
