<style>
    body{-moz-user-select:none;-webkit-user-select:none;-ms-user-select:none;user-select:none;}
    #地球{position:relative;}
    #地球 img{position:absolute;top:0;left:0;max-height:100vh;max-width:100vh;}
    #米{position:fixed;right:20px;top:20px;transition-duration:.3s;}
    #挖{position:fixed;right:20px;bottom:20px;transition-duration:.3s;}
    #挖:hover{transform:scale(1.2)}
    #挖:active{transform:scale(0.9)}
    #b{transform-origin:bottom;}
    #c{transform-origin:bottom;}

    @keyframes 暴击{0%,100%{transform:scale(1)}50%{transform:scale(2)}}
    @keyframes b{
        0%{transform:rotate(0deg) translateX(0) translateY(0);}
        40%,100%{transform:rotate(-90deg) translateX(400px) translateY(-100px);}
    }
    @keyframes c{
        0%{transform:rotate(0deg) translateX(0) translateY(0);}
        40%,100%{transform:rotate(90deg) translateX(-380px) translateY(-100px);}
    }
</style>

<style id="进度"></style>

<div id="地球">
    <img id="b" src="/x/18239369/b.png">
    <img id="c" src="/x/18239369/c.png">
    <img id="a" src="/x/18239369/a.png">
    <img id="e" src="/x/18239369/e.png">
</div>
<div id="米"></div>
<div id="挖" onclick="挖()"><img src="/x/18239369/f.png"></div>

<script>
    // let 球=500;
    let 球=12742000;
    let 米=0;
    function 挖(){

        if(Math.floor(Math.random()*20)==0){
            米+=100;
            document.getElementById("米").style=`animation:暴击 0.3s linear 0s 1 forwards;`;
        }else{
            米+=1;
            document.getElementById("米").style=``;
        }

        let 进度=((米/球)*630).toFixed(1)*1;
        document.getElementById("进度").innerHTML="#a{clip-path:inset("+(31+进度)+"px 0 0 0);}#e{transform:translate(0,"+进度+"px);}";

        let dy="";
        let 米米=米+"";
        for(let i=0;米米.length>i;i++){
            dy+="<img src='/x/18239369/"+米米[i]+".png'>";
        }
        dy+="<img src='/x/18239369/m.png'>";
        document.getElementById("米").innerHTML=dy;

        if(米>=球){
            document.getElementById("挖").innerHTML="";
            document.getElementById("进度").innerHTML=`#a,#e{display:none;}`;
            document.getElementById("b").style=`animation:b 2s linear 0s 1 forwards;`;
            document.getElementById("c").style=`animation:c 2s linear 0s 1 forwards;`;
        }
    }
</script>
