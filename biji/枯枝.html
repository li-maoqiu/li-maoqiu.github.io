〈灰白〉持有的卡牌。<br>
一根捡来的树枝，整体看上去是直挺的，细看略有弯曲，深棕色的表面带着大自然鬼斧神工的优美纹路。它可能来自一棵茁壮的树，如今失去了生命力，却依然结实，手感很好，还散发着淡淡的清香。<br>
<br>

灰白会把获得的各种坚硬、锋利之类的强化附着给它。<br>
<br>

<blockquote>
放学，〈晓寒〉收拾好东西，走出教学楼，无意间瞥见〈灰白〉站在树下，正弯腰捡起一根掉落的树枝，然后悄悄走到教学楼后面。<br>
〈晓寒〉好奇的跟了上去，看到〈灰白〉翻手变出一张卡牌，将卡牌抛在空中，落回手里时已经变成了一根〈树枝〉。〈灰白〉拿着两根树枝像是在比较哪个更好看。
</blockquote>
<br>
