〈牧羊城／第四中学〉1班的学生。<br>
黑色短发，里面藏着蓝色挑染，长相俊秀。白色头戴式耳机挂在脖子上，一手随意插在裤兜里。<br>
待人友善，但总有种疏离感，在女生里有很高的人气——这是〈灰白〉对她的印象。<br>
印象里〈江屿〉从来不穿夏款校服的裙子，一直是秋款的长裤。再配上她的长相和气质，比起“好看的女生”更像是清冷的“美少年”。<br>
