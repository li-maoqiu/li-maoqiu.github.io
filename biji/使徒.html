被神选中的使者，会打上〈神印〉，并获得部分神力，执行神的指令。<br>
如〈亚伟〉的使徒会试图毁灭人类，而〈克依沃〉的使徒会阻止。<br>
<br>

<b>光侍</b>：〈亚伟〉的使徒。使用神力时眼睛会变成金色（包括眼白）。更偏伤害，用圣光灼烧敌人。<br>
<b>暗侍</b>：〈克依沃〉的使徒。使用神力眼睛会变成黑色（包括眼白）。更偏保护，用黑暗笼罩友方。<br>
