使用〈真界〉的力量影响〈现世〉，简单的说就是意识影响物质的能力。比如人想造出火焰，需要用积攒火焰能量的火石，而异想可以让人不需要外物直接造出火焰。<br>
不同的异想体系分为了〈魔能术〉、〈巫术〉等不同〈技艺〉。<br>
<br>

异想的使用并不是随心所欲的，取决于使用者在〈真界〉的形态。<br>
