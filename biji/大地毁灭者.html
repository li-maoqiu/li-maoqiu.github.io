造型是一把古朴的短管霰弹枪。<br>
非常危险的武器，击发能够瞬间毁灭掉使用者所理解的世界，比如使用者认知到这个世界是一片大陆，则整个大陆会瞬间毁灭；使用者认知到这个世界是一个无限大的世界，则整个世界都会瞬间毁灭。<br>
由于最初使用它的人只是一个生活在内陆的普通猎人，不了解太远的地方，一次击发只毁灭了一大片土地。人们在凭空出现的巨大坑洞底部找到了这把枪，并以“大地毁灭者”为它命名。
