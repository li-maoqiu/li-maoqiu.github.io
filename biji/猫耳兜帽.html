〈灰白〉持有的卡牌。<br>
召唤一件衣服并瞬间穿上，也可以不换衣服。<br>
在别人看不到的地方可以操纵几乎一切，能力施展过程中如果被人看到会瞬间失效。<br>
<br>

<blockquote>〈灰白〉翻手变出一张卡牌，抛向半空中，卡牌猛然变大，随后下落砸向〈灰白〉，竟直接穿过了他的身体。<br>
卡牌落地消失，〈灰白〉身上已经换了一套衣服，从原本的学校制服变成了宽大的连帽衫，将本就不高的〈灰白〉衬托的更小了。<br>
戴好口罩和有猫耳装饰的兜帽，〈灰白〉向着小巷深处走去。</blockquote>
