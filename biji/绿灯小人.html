〈牧羊城〉的都市传说：信号灯里的小人是活的。<br>
<br>

监控摄像头拍到它们是会有信号干扰，变成黑屏。<br>
说话是信号灯提示音那种机械女声，带着播放设备老化的电流和杂音：「变别怕，现在、已经、安全。」<br>
会指引人类远离危险，它们认为这是自己的使命。<br>
团结、速度快。<br>
但对于执迷不悟的坏人，「闯红灯，我们、无能为力。」虽然是不带感情的机械音，却好像能听出语气里的遗憾。<br>
<br>

<b>出场</b>：<br>
〈w|猫|16060431〉（信号灯）<br>
