比如无坚不摧之剑碰上坚不可摧之盾，结果是盾防住了剑，因为这把盾的序位高于剑。<br>
反之，如果剑的序位更高，就可以砍断盾了。<br>
世界也存在序位，通常不会相差太大，但也存在比较夸张的情况，比如A世界最锋利的剑，可能划不开B世界随便一人的手。<br>
