亡社尝试过制造出“R”，都远不如真正的R，但也十分强大。（伪R是一定程度上获得R的能力，不是复制人，长相、体形、性格并不相同。）<br>
<br>

红R：红发，眼神愤怒。<br>
<br>

蓝R（〈冰川〉）：浅蓝发，眼神带点温柔的笑意。〈盖亚科技联盟〉的外交官，在有意识防御时可以阻挡任何攻击，在即将遇到危险时会自动触发让时间减速以应对危机，根据情况速度会不同，最危急的情况时间会暂停。<br>
<br>

银R：银发，眼神怜悯。<br>
<br>

黄R：黄色头发，眼神带点调皮的笑意。<br>
