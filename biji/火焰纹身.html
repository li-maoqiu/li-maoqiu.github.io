〈灰白〉持有的卡牌。<br>
蔓延到全身的火焰纹路，能烧掉身上的禁锢和毒、诅咒等，能抵御攻击。让使用者飞起来、抛投火球等。将全部火焰凝聚射出，速度和伤害极高，但会解除火焰纹身的状态。<br>
<br>

<blockquote>
卡牌化作火焰燃烧，顺着手臂蔓延，直至包裹全身，火焰烧断了荆棘与铁链，火球和闪电打在他身上没造成一点伤害，反而火焰燃烧的更强烈了。<br>
〈灰白〉抬起左手，全身火焰收缩凝聚在他的指尖，化作一点极致凝练的红色光点，光点忽然朝着〈男人〉射出，连空间都被划出火痕。
</blockquote>
